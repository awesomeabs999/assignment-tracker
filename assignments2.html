<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyDesk — Assignment Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f2f0eb;
    --surface: #faf9f7;
    --surface2: #ebe8e2;
    --border: #d3cfc8;
    --text: #1c1b19;
    --muted: #8c8a84;
    --accent: #1c1b19;
    --accent2: #4a4845;
    --accent3: #6e6c67;
    --danger: #7a3b3b;
    --success: #2d4a36;
    --r: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body, header, aside, .modal, .assignment-card, .stat-card, .subject-item, .filter-btn, .search-bar, .progress-overview, .form-group input, .form-group select, .form-group textarea, .due-date, .type-tag, .toast {
    transition: background-color 0.25s, border-color 0.25s, color 0.25s;
  }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  html.dark {
    --bg: #111110;
    --surface: #1a1917;
    --surface2: #222120;
    --border: #2e2d2b;
    --text: #e8e6e1;
    --muted: #7a7874;
    --accent: #e8e6e1;
    --accent2: #b5b2ab;
    --accent3: #8c8a84;
    --danger: #c47a7a;
    --success: #6aab7e;
    --r: 10px;
  }

  /* TOP BAR */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Manrope', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo span { color: var(--muted); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .date-badge {
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 20px;
    letter-spacing: 0.3px;
  }

  .btn-add {
    background: var(--text);
    color: var(--bg);
    border: none;
    padding: 8px 18px;
    border-radius: 8px;
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.2px;
  }

  .btn-add:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(28,27,25,0.15); }

  /* MAIN LAYOUT */
  main {
    display: grid;
    grid-template-columns: 260px 1fr;
    flex: 1;
    gap: 0;
  }

  /* SIDEBAR */
  aside {
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 32px;
    position: sticky;
    top: 61px;
    height: calc(100vh - 61px);
    overflow-y: auto;
  }

  .sidebar-section h3 {
    font-family: 'Manrope', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 16px;
    margin-bottom: 10px;
    transition: border-color 0.2s;
  }

  .stat-card:hover { border-color: var(--text); }

  .stat-num {
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 38px;
    line-height: 1;
    color: var(--text);
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    background: none;
    border: 1px solid transparent;
    padding: 8px 12px;
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }

  .filter-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border); }

  .filter-btn.active {
    background: var(--surface2);
    color: var(--text);
    border-color: var(--text);
  }

  .filter-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .filter-count {
    margin-left: auto;
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    background: var(--surface);
    padding: 1px 6px;
    border-radius: 10px;
  }

  /* SUBJECT PILLS */
  .subject-list { display: flex; flex-direction: column; gap: 6px; }

  .subject-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .subject-item:hover { border-color: var(--muted); }
  .subject-item.active { border-color: var(--text); color: var(--text); font-weight: 600; }

  .subject-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 8px;
  }

  /* CONTENT AREA */
  .content {
    padding: 28px 32px;
    overflow-y: auto;
  }

  .content-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .view-title {
    font-family: 'Manrope', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
  }

  .search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    min-width: 220px;
  }

  .search-bar input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    width: 100%;
  }

  .search-bar input::placeholder { color: var(--muted); }

  /* PROGRESS BAR */
  .progress-overview {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 20px 24px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 20px;
  }

  .prog-item { text-align: center; }
  .prog-value { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 28px; margin-bottom: 2px; color: var(--text); }
  .prog-label { font-family: 'Manrope', sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

  /* ASSIGNMENTS */
  .section-label {
    font-family: 'Manrope', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin: 20px 0 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .assignment-list { display: flex; flex-direction: column; gap: 8px; }

  .assignment-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 24px 1fr auto auto auto;
    align-items: center;
    gap: 14px;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .assignment-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
    background: var(--border);
    transition: background 0.2s;
  }

  .assignment-card:hover { border-color: var(--muted); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(28,27,25,0.1); }
  .assignment-card.overdue::before { background: var(--danger); }
  .assignment-card.due-soon::before { background: var(--accent2); }
  .assignment-card.upcoming::before { background: var(--accent3); }
  .assignment-card.done::before { background: var(--success); }
  .assignment-card.done { opacity: 0.55; }

  .check-circle {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    background: transparent;
  }

  .check-circle svg { opacity: 0; transition: opacity 0.2s; }
  .check-circle:hover { border-color: var(--muted); }
  .check-circle:hover svg { opacity: 0.4; }
  .assignment-card.done .check-circle { border-color: var(--muted); }
  .assignment-card.done .check-circle svg { opacity: 1; stroke: var(--muted); }

  .assignment-info { min-width: 0; }

  .assignment-title {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .assignment-card.done .assignment-title { text-decoration: line-through; color: var(--muted); }

  .assignment-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--muted);
  }

  .subject-tag {
    font-family: 'Manrope', sans-serif;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
  }

  .type-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .due-date {
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    white-space: nowrap;
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
  }

  .due-date.overdue { color: var(--danger); border-color: rgba(122,59,59,0.3); background: rgba(122,59,59,0.07); }
  .due-date.due-soon { color: var(--accent2); border-color: rgba(74,72,69,0.3); background: rgba(74,72,69,0.07); }
  .due-date.upcoming { color: var(--accent3); border-color: rgba(110,108,103,0.3); background: rgba(110,108,103,0.07); }

  .priority-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .action-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    font-size: 14px;
    transition: color 0.15s;
    display: flex; align-items: center;
  }

  .action-btn:hover { color: var(--text); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(28,27,25,0.45);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px;
    width: 100%;
    max-width: 500px;
    transform: translateY(20px);
    transition: transform 0.25s;
    box-shadow: 0 30px 80px rgba(28,27,25,0.2);
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal h2 {
    font-family: 'Manrope', sans-serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 24px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .form-group {
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group label {
    font-family: 'Manrope', sans-serif;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .form-group input, .form-group select, .form-group textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--text);
  }

  .form-group select option { background: var(--surface2); }
  .form-group textarea { resize: vertical; min-height: 70px; }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    justify-content: flex-end;
  }

  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    padding: 9px 20px;
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-cancel:hover { border-color: var(--text); color: var(--text); }

  .btn-save {
    background: var(--text);
    color: var(--bg);
    border: none;
    padding: 9px 24px;
    border-radius: 8px;
    font-family: 'Manrope', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-save:hover { background: var(--accent2); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 16px; }
  .empty-state h3 { font-family: 'Manrope', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 300;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
    box-shadow: 0 8px 24px rgba(28,27,25,0.15);
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--success); }
  .toast.error { border-color: var(--danger); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* DARK MODE TOGGLE */
  .theme-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted);
    flex-shrink: 0;
  }
  .theme-toggle:hover { border-color: var(--text); color: var(--text); }
  .theme-toggle svg { width: 16px; height: 16px; }
  .icon-sun { display: none; }
  .icon-moon { display: block; }
  html.dark .icon-sun { display: block; }
  html.dark .icon-moon { display: none; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .assignment-card { animation: fadeIn 0.2s ease forwards; }
</style>
</head>
<body>

<header>
  <div class="logo">✦ <span>Study</span>Desk</div>
  <div class="header-right">
    <div class="date-badge" id="live-date"></div>
    <button class="btn-add" onclick="openModal()">+ Add Assignment</button>
    <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode" onclick="toggleTheme()">
      <svg class="icon-moon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
      <svg class="icon-sun" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>
</header>

<main>
  <aside>
    <div class="sidebar-section">
      <h3>Overview</h3>
      <div class="stat-card">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">Total Assignments</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-overdue">0</div>
        <div class="stat-label">Overdue</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-done">0</div>
        <div class="stat-label">Completed</div>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Filter</h3>
      <button class="filter-btn active" onclick="setFilter('all', this)">
        <span class="filter-dot" style="background:var(--text)"></span> All
        <span class="filter-count" id="fc-all">0</span>
      </button>
      <button class="filter-btn" onclick="setFilter('overdue', this)">
        <span class="filter-dot" style="background:var(--danger)"></span> Overdue
        <span class="filter-count" id="fc-overdue">0</span>
      </button>
      <button class="filter-btn" onclick="setFilter('due-soon', this)">
        <span class="filter-dot" style="background:var(--accent2)"></span> Due Soon
        <span class="filter-count" id="fc-soon">0</span>
      </button>
      <button class="filter-btn" onclick="setFilter('upcoming', this)">
        <span class="filter-dot" style="background:var(--accent3)"></span> Upcoming
        <span class="filter-count" id="fc-upcoming">0</span>
      </button>
      <button class="filter-btn" onclick="setFilter('done', this)">
        <span class="filter-dot" style="background:var(--success)"></span> Completed
        <span class="filter-count" id="fc-done">0</span>
      </button>
    </div>

    <div class="sidebar-section">
      <h3>Subjects</h3>
      <div class="subject-list" id="subject-list">
        <div style="font-size:12px;color:var(--muted)">No subjects yet</div>
      </div>
    </div>
  </aside>

  <div class="content">
    <div class="content-header">
      <h1 class="view-title" id="view-title">All Assignments</h1>
      <div class="search-bar">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="color:var(--muted);flex-shrink:0"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" placeholder="Search assignments..." id="search-input" oninput="renderAssignments()">
      </div>
    </div>

    <div class="progress-overview">
      <div class="prog-item">
        <div class="prog-value" id="p-total">0</div>
        <div class="prog-label">Total</div>
      </div>
      <div class="prog-item">
        <div class="prog-value" id="p-overdue">0</div>
        <div class="prog-label">Overdue</div>
      </div>
      <div class="prog-item">
        <div class="prog-value" id="p-soon">0</div>
        <div class="prog-label">Due Soon</div>
      </div>
      <div class="prog-item">
        <div class="prog-value" id="p-complete">0%</div>
        <div class="prog-label">Complete</div>
      </div>
    </div>

    <div id="assignments-container"></div>
  </div>
</main>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">New Assignment</h2>
    <div class="form-group">
      <label>Assignment Title *</label>
      <input type="text" id="f-title" placeholder="e.g. Literature Review on Neural Networks">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Subject *</label>
        <input type="text" id="f-subject" placeholder="e.g. Machine Learning" list="subjects-datalist">
        <datalist id="subjects-datalist"></datalist>
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="f-type">
          <option>Essay</option>
          <option>Assignment</option>
          <option>Project</option>
          <option>Lab Report</option>
          <option>Presentation</option>
          <option>Quiz</option>
          <option>Exam</option>
          <option>Tutorial</option>
          <option>Other</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Due Date *</label>
        <input type="date" id="f-due">
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="f-priority">
          <option value="high">🔴 High</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Notes (optional)</label>
      <textarea id="f-notes" placeholder="Any extra details, instructions, or reminders..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveAssignment()">Save Assignment</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <span id="toast-icon">✓</span>
  <span id="toast-msg"></span>
</div>

<script>
  const STORE_KEY = 'studydesk_v2';
  let assignments = [];
  let editingId = null;
  let currentFilter = 'all';
  let currentSubject = null;

  // ── PERSIST ──────────────────────────────────────────────────────────
  function save() { localStorage.setItem(STORE_KEY, JSON.stringify(assignments)); }
  function load() {
    try { assignments = JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch { assignments = []; }
    if (!assignments.length) seedDefaults();
  }

  function seedDefaults() {
    const today = new Date();
    const fmt = d => d.toISOString().split('T')[0];
    const add = n => { const d = new Date(today); d.setDate(d.getDate() + n); return fmt(d); };
    assignments = [
      { id: uid(), title: 'Linear Algebra Problem Set 4', subject: 'Mathematics', type: 'Assignment', due: add(-2), priority: 'high', notes: 'Chapter 7 exercises', done: false },
      { id: uid(), title: 'Literature Review Draft', subject: 'English', type: 'Essay', due: add(1), priority: 'high', notes: 'Min 2000 words, APA format', done: false },
      { id: uid(), title: 'Data Structures Lab Report', subject: 'Computer Science', type: 'Lab Report', due: add(3), priority: 'medium', notes: 'Include complexity analysis', done: false },
      { id: uid(), title: 'Physics Midterm Exam', subject: 'Physics', type: 'Exam', due: add(7), priority: 'high', notes: 'Chapters 4-8', done: false },
      { id: uid(), title: 'Group Presentation Slides', subject: 'Business', type: 'Presentation', due: add(10), priority: 'medium', notes: '15 min per group', done: false },
      { id: uid(), title: 'Weekly Tutorial Quiz', subject: 'Computer Science', type: 'Quiz', due: add(-5), priority: 'low', notes: '', done: true },
    ];
    save();
  }

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

  // ── DATE HELPERS ──────────────────────────────────────────────────────
  function today() { return new Date().toISOString().split('T')[0]; }

  function getStatus(assignment) {
    if (assignment.done) return 'done';
    const due = new Date(assignment.due);
    const now = new Date(today());
    const diff = Math.ceil((due - now) / 86400000);
    if (diff < 0) return 'overdue';
    if (diff <= 3) return 'due-soon';
    return 'upcoming';
  }

  function formatDue(assignment) {
    const due = new Date(assignment.due + 'T00:00:00');
    const now = new Date(today());
    const diff = Math.ceil((due - now) / 86400000);
    if (assignment.done) return 'Done';
    if (diff < 0) return `${Math.abs(diff)}d overdue`;
    if (diff === 0) return 'Due today!';
    if (diff === 1) return 'Due tomorrow';
    if (diff <= 7) return `In ${diff} days`;
    return due.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
  }

  // ── SUBJECTS ──────────────────────────────────────────────────────────
  const SUBJECT_COLORS = [
    '#5c5955','#7a7672','#3d3c3a','#8c8a84','#4a4845',
    '#6e6c67','#928f89','#2e2d2b','#706e69','#545250'
  ];

  function getSubjects() {
    const map = {};
    assignments.forEach(a => {
      if (!map[a.subject]) map[a.subject] = 0;
      map[a.subject]++;
    });
    return map;
  }

  function subjectColor(name) {
    let hash = 0;
    for (let c of name) hash = (hash * 31 + c.charCodeAt(0)) % SUBJECT_COLORS.length;
    return SUBJECT_COLORS[Math.abs(hash)];
  }

  // ── RENDER ──────────────────────────────────────────────────────────
  function renderAll() {
    updateStats();
    renderSidebar();
    renderAssignments();
    updateDatalist();
  }

  function updateStats() {
    const total = assignments.length;
    const done = assignments.filter(a => a.done).length;
    const overdue = assignments.filter(a => getStatus(a) === 'overdue').length;
    const soon = assignments.filter(a => getStatus(a) === 'due-soon').length;
    const upcoming = assignments.filter(a => getStatus(a) === 'upcoming').length;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-overdue').textContent = overdue;
    document.getElementById('p-total').textContent = total;
    document.getElementById('p-overdue').textContent = overdue;
    document.getElementById('p-soon').textContent = soon;
    document.getElementById('p-complete').textContent = total ? Math.round(done/total*100)+'%' : '0%';

    document.getElementById('fc-all').textContent = total;
    document.getElementById('fc-overdue').textContent = overdue;
    document.getElementById('fc-soon').textContent = soon;
    document.getElementById('fc-upcoming').textContent = upcoming;
    document.getElementById('fc-done').textContent = done;
  }

  function renderSidebar() {
    const subjects = getSubjects();
    const list = document.getElementById('subject-list');
    if (!Object.keys(subjects).length) {
      list.innerHTML = '<div style="font-size:12px;color:var(--muted)">No subjects yet</div>';
      return;
    }
    list.innerHTML = Object.entries(subjects).map(([name, count]) => `
      <div class="subject-item ${currentSubject === name ? 'active' : ''}" onclick="filterBySubject('${name.replace(/'/g,"\\'")}')">
        <span style="display:flex;align-items:center;gap:8px">
          <span class="subject-dot" style="background:${subjectColor(name)}"></span>
          <span style="font-size:13px">${name}</span>
        </span>
        <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${count}</span>
      </div>
    `).join('');
  }

  function renderAssignments() {
    const search = document.getElementById('search-input').value.toLowerCase();

    let filtered = assignments.filter(a => {
      const matchSearch = !search || a.title.toLowerCase().includes(search) || a.subject.toLowerCase().includes(search) || a.type.toLowerCase().includes(search);
      const matchSubject = !currentSubject || a.subject === currentSubject;
      const status = getStatus(a);
      const matchFilter = currentFilter === 'all' || status === currentFilter;
      return matchSearch && matchSubject && matchFilter;
    });

    // Sort: overdue first, then by due date
    filtered.sort((a, b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      return new Date(a.due) - new Date(b.due);
    });

    const container = document.getElementById('assignments-container');

    if (!filtered.length) {
      container.innerHTML = `<div class="empty-state">
        <div class="icon">📋</div>
        <h3>Nothing here</h3>
        <p>Try a different filter, or add a new assignment!</p>
      </div>`;
      return;
    }

    // Group by date status
    const groups = { overdue: [], 'due-soon': [], upcoming: [], done: [] };
    filtered.forEach(a => groups[getStatus(a)].push(a));

    const labels = { overdue: 'Overdue', 'due-soon': 'Due Soon', upcoming: 'Upcoming', done: 'Completed' };
    let html = '';
    for (const [status, items] of Object.entries(groups)) {
      if (!items.length) continue;
      html += `<div class="section-label">${labels[status]} — ${items.length}</div>
               <div class="assignment-list">`;
      items.forEach(a => {
        const st = getStatus(a);
        const color = subjectColor(a.subject);
        const prioColor = { high: 'var(--danger)', medium: 'var(--accent2)', low: 'var(--success)' }[a.priority];
        html += `
          <div class="assignment-card ${st}" onclick="editAssignment('${a.id}')">
            <div class="check-circle" onclick="event.stopPropagation();toggleDone('${a.id}')"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="var(--text)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg></div>
            <div class="assignment-info">
              <div class="assignment-title">${a.title}</div>
              <div class="assignment-meta">
                <span class="subject-tag" style="background:${color}18;color:${color};border:1px solid ${color}55">${a.subject}</span>
                <span class="type-tag">${a.type}</span>
                ${a.notes ? `<span style="font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px">📝 ${a.notes}</span>` : ''}
              </div>
            </div>
            <span class="priority-dot" style="background:${prioColor}" title="${a.priority} priority"></span>
            <span class="due-date ${st}">${formatDue(a)}</span>
            <button class="action-btn" onclick="event.stopPropagation();deleteAssignment('${a.id}')" title="Delete">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>`;
      });
      html += '</div>';
    }

    container.innerHTML = html;
  }

  function updateDatalist() {
    const dl = document.getElementById('subjects-datalist');
    const subjects = Object.keys(getSubjects());
    dl.innerHTML = subjects.map(s => `<option value="${s}">`).join('');
  }

  // ── ACTIONS ──────────────────────────────────────────────────────────
  function toggleDone(id) {
    const a = assignments.find(x => x.id === id);
    if (a) { a.done = !a.done; save(); renderAll(); showToast(a.done ? '✓ Marked complete!' : '↩ Marked incomplete', a.done ? 'success' : ''); }
  }

  function deleteAssignment(id) {
    assignments = assignments.filter(x => x.id !== id);
    save(); renderAll(); showToast('🗑 Assignment deleted', 'error');
  }

  function setFilter(f, btn) {
    currentFilter = f;
    currentSubject = null;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const titles = { all: 'All Assignments', overdue: 'Overdue', 'due-soon': 'Due Soon', upcoming: 'Upcoming', done: 'Completed' };
    document.getElementById('view-title').textContent = titles[f];
    // clear subject active
    document.querySelectorAll('.subject-item').forEach(s => s.classList.remove('active'));
    renderAssignments();
  }

  function filterBySubject(name) {
    if (currentSubject === name) { currentSubject = null; } else { currentSubject = name; }
    currentFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-btn').classList.add('active');
    document.getElementById('view-title').textContent = currentSubject ? currentSubject : 'All Assignments';
    renderSidebar();
    renderAssignments();
  }

  // ── MODAL ─────────────────────────────────────────────────────────────
  function openModal(id) {
    editingId = id || null;
    document.getElementById('modal-title').textContent = id ? 'Edit Assignment' : 'New Assignment';
    if (id) {
      const a = assignments.find(x => x.id === id);
      document.getElementById('f-title').value = a.title;
      document.getElementById('f-subject').value = a.subject;
      document.getElementById('f-type').value = a.type;
      document.getElementById('f-due').value = a.due;
      document.getElementById('f-priority').value = a.priority;
      document.getElementById('f-notes').value = a.notes;
    } else {
      document.getElementById('f-title').value = '';
      document.getElementById('f-subject').value = '';
      document.getElementById('f-type').value = 'Assignment';
      document.getElementById('f-due').value = '';
      document.getElementById('f-priority').value = 'medium';
      document.getElementById('f-notes').value = '';
    }
    document.getElementById('modal').classList.add('open');
  }

  function editAssignment(id) { openModal(id); }

  function closeModal() { document.getElementById('modal').classList.remove('open'); }

  function saveAssignment() {
    const title = document.getElementById('f-title').value.trim();
    const subject = document.getElementById('f-subject').value.trim();
    const due = document.getElementById('f-due').value;
    if (!title || !subject || !due) { showToast('⚠ Fill in required fields', 'error'); return; }
    if (editingId) {
      const a = assignments.find(x => x.id === editingId);
      a.title = title; a.subject = subject;
      a.type = document.getElementById('f-type').value;
      a.due = due;
      a.priority = document.getElementById('f-priority').value;
      a.notes = document.getElementById('f-notes').value.trim();
      showToast('✓ Assignment updated!', 'success');
    } else {
      assignments.push({ id: uid(), title, subject, type: document.getElementById('f-type').value, due, priority: document.getElementById('f-priority').value, notes: document.getElementById('f-notes').value.trim(), done: false });
      showToast('✓ Assignment added!', 'success');
    }
    save(); closeModal(); renderAll();
  }

  // ── TOAST ─────────────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type='') {
    const t = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    t.className = 'toast show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── DATE ─────────────────────────────────────────────────────────────
  function updateDate() {
    const d = new Date();
    document.getElementById('live-date').textContent = d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
  }

  // ── KEYBOARD ─────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('search-input').focus(); }
  });

  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });

  // ── THEME ─────────────────────────────────────────────────────────────
  function toggleTheme() {
    const isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('studydesk_theme', isDark ? 'dark' : 'light');
  }

  function applyTheme() {
    const saved = localStorage.getItem('studydesk_theme');
    if (saved === 'dark') document.documentElement.classList.add('dark');
  }

  // ── INIT ─────────────────────────────────────────────────────────────
  applyTheme();
  load();
  updateDate();
  renderAll();
  setInterval(updateDate, 60000);
</script>
</body>
</html>
